<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Validation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body{
            background: #ffffff;
        }

        .container{
            padding: 25px 30px 25px 30px;
            width: 400px;
            background: #f8f5f5;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 10px;
            transition: all .2s;
        }

        .container h1{
            white-space: nowrap;
            font-size: 22px;
            margin-top: 5px;
            font-weight: 600;
            text-align: center;
        }

        .container p{
            color: #808080;
            margin-top: 5px;
            margin-left: 2px;
            font-size: 14px;
            text-align: center;
        }
        .container input{
            background: #ffffff !important;
        }

        .container .new-password,
        .container .confirm-password{
            padding-left: 5px;
            margin-top: 20px;
        }

        .container .confirm-password{
            margin-top: 18px;
        }

        .container .new-password h3,
        .container .confirm-password h3{
            font-size: 14px;
            color: #808080;
            font-weight: 600;
            text-align: center;
        }

        .container .new-password input,
        .container .confirm-password input{
            all: unset;
            height: 40px;
            width: 300px;
            border: 1px solid #808080;
            border-radius: 10px;
            padding-left: 10px;
            padding-right: 20px;
            font-size: 14px;
            transition: all .2s;
            margin-left: -2px;
        }

        .container .new-password input::-ms-reveal,
        .container .confirm-password input::-ms-reveal{
            display: none;
        }

        .container .new-password input:focus,
        .container .confirm-password input:focus{
            border-color: #ffffff;
            transition: all .2s;
        }

        .container .new-password i{
            position: absolute;
            right: 50px;
            color: #c4c2c2;
            font-size: 17px;
            cursor: pointer;
            display: block;
            margin-top: -28px;
        }

        .container .new-password .eye-slash{
            display: none;
        }

        .container .new-password p{
            font-size: 17px;
            margin-left: 0px;
        }

        .container .msg{
            font-size: 12px;
            margin-left: 6px;
            display: none;
        }

        .container .submit-btn{
            all: unset;
            height: 40px;
            width: 100%;
            background: #706d6d;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            color: #ffffff;
            margin-top: 18px;
            cursor: pointer;
        }

        .container .inline-block {
            display: inline-block;
        }

        .container .eight-char-cross{
            display: inline-block;
            color: red;
        }

        .container .eight-char-check{
            display: none;
            color: greenyellow;
        }

        .container .one-letter-cross{
            display: inline-block;
            color: red;
        }

        .container .one-letter-check{
            display: none;
            color: greenyellow;
        }

        .container .one-number-cross{
            display: inline-block;
            color: red;
        }

        .container .one-number-check{
            display: none;
            color: greenyellow;
        }

        .container .one-special-char-cross{
            display: inline-block;
            color: red;
        }

        .container .one-special-char-check{
            display: none;
            color: greenyellow;
        }



    </style>
</head>
<body>
<div class="container">
    <h1>Create new Password</h1>

    <div th:if="${error}">
        <div class="alert alert-danger">
            <span th:text="${error}"></span>
        </div>
    </div>

    <form th:action="@{/user/password/reset/password-reset}" th:object="${passwordResetByLinkDto}" method="post">
        <input type="hidden" name="linkParam" th:value="${linkParam}"/>
        <p class="error-message"
           th:if="${#fields.hasGlobalErrors()}"
           th:each="error : ${#fields.errors('global')}"
           th:text="${error}">Validation error</p>

        <div class="new-password">
            <h3>New Password</h3>
            <input id="newPassword" type="password" class="new-pass-input"
                   placeholder="Create Password" onkeyup="checkPassword()" th:field="*{newPassword}">
            <i class="fa-regular fa-eye eye"></i>
            <i class="fa-regular fa-eye-slash eye-slash"></i>
        </div>
        <p class="error-message"
           th:each="error: ${#fields.errors('newPassword')}"
           th:text="${error}">Validation error</p>

        <div>
            <i class="fa fa-times eight-char-cross"></i>
            <i class="fa fa-check eight-char-check"></i>
            <span class="inline-block">At least 8 characters</span>
        </div>
        <div>
            <i class="fa fa-times one-letter-cross"></i>
            <i class="fa fa-check one-letter-check"></i>
            <span class="inline-block">At least one letter</span>
        </div>
        <div>
            <i class="fa fa-times one-number-cross"></i>
            <i class="fa fa-check one-number-check"></i>
            <span class="inline-block">At least one number</span>
        </div>
        <div>
            <i class="fa fa-times one-special-char-cross"></i>
            <i class="fa fa-check one-special-char-check"></i>
            <span class="inline-block">At least one special char (.@$!%*#?&)</span>
        </div>

        <div class="confirm-password">
            <h3>Confirm Password</h3>
            <input id="repeatNewPassword" type="password" class="confirm-pass-input"
                   placeholder="Confirm Password" onkeyup="checkPassword()" th:field="*{repeatNewPassword}">
        </div>
        <p class="error-message"
           th:each="error: ${#fields.errors('repeatNewPassword')}"
           th:text="${error}">Validation error</p>
        <p class="msg">Both passwords must match</p>


        <button id="submitBtn" class="submit-btn" disabled="true">Submit</button>
    </form>
</div>

<script >
    let eye = document.querySelector(".container .new-password .eye");
    let eyeSlash = document.querySelector(".container .new-password .eye-slash");
    let newPassInput = document.querySelector(".container .new-password input");
    let confirmPassInput = document.querySelector(".container .confirm-password input");
    let submitBtn = document.querySelector(".container .submit-btn");
    let msg = document.querySelector(".container .msg");
    let eightCharCross = document.querySelector(".container .eight-char-cross");
    let eightCharCheck = document.querySelector(".container .eight-char-check");
    let oneLetterCross = document.querySelector(".container .one-letter-cross");
    let oneLetterCheck = document.querySelector(".container .one-letter-check");
    let oneNumberCross = document.querySelector(".container .one-number-cross");
    let oneNumberCheck = document.querySelector(".container .one-number-check");
    let oneSpecialCharCross = document.querySelector(".container .one-special-char-cross");
    let oneSpecialCharCheck = document.querySelector(".container .one-special-char-check");

    let passToggle =()=>{
        if(newPassInput.type === "password"){
            newPassInput.type = "text";
            eye.style.display = "none";
            eyeSlash.style.display = "block";
        }else{
            newPassInput.type = "password";
            eye.style.display = "block";
            eyeSlash.style.display = "none";
        }
    }

    let checkPassword =()=>{
        let result = true;
        if(newPassInput.value === confirmPassInput.value && newPassInput.value != "" && confirmPassInput.value != ""){
            msg.style.display = "block";
            msg.style.color = "#00ff00";
            msg.innerHTML = `<i class="fa-solid fa-circle-check"></i> Both passwords matched.`;
        }else{
            msg.style.display = "block";
            msg.style.color = "#ff0000";
            msg.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> Both passwords don't match.`;
            result = false;
        }

        let length = new RegExp(".{8,}");
        if(!length.test(newPassInput.value)){
            eightCharCross.style.display = "inline-block";
            eightCharCheck.style.display = "none";
            result = false;
        }else{
            eightCharCheck.style.display = "inline-block";
            eightCharCross.style.display = "none";
        }

        let oneLetters = new RegExp("[a-zA-Z]");
        if(!oneLetters.test(newPassInput.value)){
            oneLetterCross.style.display = "inline-block";
            oneLetterCheck.style.display = "none";
            result = false;
        }else{
            oneLetterCheck.style.display = "inline-block";
            oneLetterCross.style.display = "none";
        }

        var oneNumber = new RegExp("[*\\d]");
        if(!oneNumber.test(newPassInput.value)){
            oneNumberCross.style.display = "inline-block";
            oneNumberCheck.style.display = "none";
            result = false;
        }else{
            oneNumberCheck.style.display = "inline-block";
            oneNumberCross.style.display = "none";
        }

        let oneSpecialChar = new RegExp("[.@$!%*#?&]");
        if(!oneSpecialChar.test(newPassInput.value)){
            oneSpecialCharCross.style.display = "inline-block";
            oneSpecialCharCheck.style.display = "none";
            result = false;
        }else{
            oneSpecialCharCheck.style.display = "inline-block";
            oneSpecialCharCross.style.display = "none";
        }

        let sbmtBtn = document.getElementById("submitBtn")
        sbmtBtn.disabled = !result;
        if(result){
            sbmtBtn.style.background = "#0be0ea";
        }else{
            sbmtBtn.style.background = "#706d6d";
        }


        return result;
    }

    submitBtn.addEventListener("click", ()=>{
        console.log("not disabled");
        if(!checkPassword()){
            msg.style.display = "block";
            msg.style.color = "#808080";
            msg.innerHTML = "Please fill all the required fields."
        }else{
            /*call server*/
        }
    });

    eye.addEventListener("click", passToggle);
    eyeSlash.addEventListener("click", passToggle);

</script>
</body>
</html>
