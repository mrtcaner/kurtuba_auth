<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Latest compiled and minified CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .result-wrapper {
            max-width: 550px;
            margin-inline: auto;
            -webkit-box-shadow: 0 0 20px #f3f3f3;
            box-shadow: 0 0 20px #f3f3f3;
            padding: 30px 20px;
            background-color: #fff;
            border-radius: 10px;
        }

        .result-contents.center-text .result-contents-icon {
            margin-inline: auto;
        }
        .result-contents-icon {
            display: -webkit-box;
            display: -ms-flexbox;
            display: flex;
            -webkit-box-align: center;
            -ms-flex-align: center;
            align-items: center;
            -webkit-box-pack: center;
            -ms-flex-pack: center;
            justify-content: center;
            height: 100px;
            width: 100px;
            /*background-color: ${bgColor};!*#65c18c->green or #ba0f0f->red*!*/
            color: #fff;
            font-size: 50px;
            border-radius: 50%;
            margin-bottom: 30px;
        }
        .result-contents-title {
            font-size: 32px;
            line-height: 36px;
            margin: -6px 0 0;
        }
        .result-contents-para {
            font-size: 16px;
            line-height: 24px;
            margin-top: 15px;
        }
        .btn-wrapper {
            display: block;
        }
        .cmn-btn.btn-bg-1 {
            background: #6176f6;
            color: #fff;
            border: 2px solid transparent;
            border-radius:3px;
            text-decoration: none;
            padding:5px;
        }
    </style>
</head>

<body>
<!-- results area start -->
<div class="result-area text-center mt-5">
    <div class="container">
        <div class="result-wrapper">
            <div class="result-contents center-text">
                <div class="result-contents-icon" th:style="'background-color:' + ${bgColor}">
                    <i class="fas" th:classappend="${icon}"></i><!--fa-check or fa-exclamation-->
                </div>
                <h4 class="result-contents-title"><span th:text="${title}"></span></h4>
                <div>
                    <p><span th:text="${message1}"></span></p>
                </div>
                <div>
                    <p><span th:text="${message2}"></span></p>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- results area end -->

<!-- Latest compiled JavaScript -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
