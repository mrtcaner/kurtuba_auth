<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body th:replace="~{adm/fragments :: shell(pageTitle='Localization', activeSection='localization', content=~{::content})}">
<th:block th:fragment="content">
    <div class="mb-4">
        <h2 class="mb-2">Supported Countries</h2>
        <p class="text-muted mb-0">Manage the country codes registration and locale preferences are allowed to use.</p>
    </div>

    <th:block th:replace="~{adm/fragments :: localizationNav(activeLocalizationSection='countries')}" />

    <div th:if="${successMessage}" class="alert alert-success" role="alert" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" role="alert" th:text="${errorMessage}"></div>

    <div class="row">
        <div class="col-lg-4 mb-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">Add Country</h5>
                    <form th:action="@{/auth/adm/pages/localization/countries}" method="post">
                        <div class="form-group">
                            <label for="countryCode">Country Code</label>
                            <input id="countryCode" name="countryCode" type="text" class="form-control" placeholder="tr" />
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">Add Country</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-8 mb-4">
            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="thead-light">
                            <tr>
                                <th>Country Code</th>
                                <th style="width: 28%">Created</th>
                                <th style="width: 14%"></th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:if="${!hasSupportedCountries}">
                                <td colspan="3" class="text-center text-muted py-4">No supported countries configured.</td>
                            </tr>
                            <tr th:each="country : ${supportedCountries}">
                                <td><span class="badge badge-light" th:text="${country.countryCode}">tr</span></td>
                                <td class="text-muted"
                                    th:attr="data-localized-instant=${country.createdDate != null ? country.createdDate : null}"
                                    th:text="${country.createdDate != null ? country.createdDate : '-'}">2026-01-01T00:00:00Z</td>
                                <td>
                                    <form th:action="@{/auth/adm/pages/localization/countries/{id}/delete(id=${country.id})}" method="post"
                                          onsubmit="return confirm('Delete this supported country?');">
                                        <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                                    </form>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</th:block>
</body>
</html>
