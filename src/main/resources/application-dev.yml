server:
  port: 8080


auth:
  server:
    issuer-url: http://192.168.1.2:8080
    protocol: http://
    ip: 192.168.1.2
    port: 8080

logging:
  level:
    root: info

spring:
  jpa:
    hibernate:
      ddl-auto: update
      show-sql: true
    properties:
      hibernate:
        show_sql: true
        default_schema: kurtuba

  datasource:
    url: jdbc:postgresql://192.168.1.114:5432/postgres
    username: postgres
    password: postgres
    hikari:
      schema: kurtuba

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://${auth.server.ip}:${auth.server.port}/oauth2/jwks
  mail:
    host: 192.168.1.114
    port: 1025
    username: user
    password: pass
    protocol: smtp


management:
  security:
    enabled: false
  endpoints:
    web:
      exposure:
        include: health, info, env

kurtuba:
  password-reset:
    code:
      validity:
        minutes: 30
  rsa-jwk:
    file: "rsa-jwk.json"
    secrets: '{"363ff933-15b5-4447-a78d-fa2560049cee": "FD7pr&.f!my?k#8:", "fe4ab529-e7d1-4a00-b32d-4bb4cb5776db": "dI1Q089vTAd3aAO"}'
  email:
    max-try-count: 3


