<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body th:replace="~{adm/fragments :: shell(pageTitle='OAuth Clients', activeSection='oauth-clients', content=~{::content})}">
<th:block th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="mb-1">OAuth Clients</h2>
            <p class="text-muted mb-0">Manage registered clients used by web, mobile, service, and default auth flows.</p>
        </div>
        <a class="btn btn-primary" th:href="@{/auth/adm/oauth-clients/new}">Create Client</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" role="alert" th:text="${successMessage}"></div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="thead-light">
                    <tr>
                        <th>Client Name</th>
                        <th>Client ID</th>
                        <th>Type</th>
                        <th>Scopes</th>
                        <th>Access TTL</th>
                        <th></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(clients)}">
                        <td colspan="6" class="text-center text-muted py-4">No OAuth clients found.</td>
                    </tr>
                    <tr th:each="client : ${clients}">
                        <td th:text="${client.clientName}">demo-web-client</td>
                        <td><code th:text="${client.clientId}">demo-web-client</code></td>
                        <td th:text="${client.clientType}">WEB</td>
                        <td th:text="${client.scopeEnabled and client.scopes != null and !client.scopes.isEmpty() ? #strings.arrayJoin(client.scopes.toArray(), ', ') : 'Scopes disabled'}">USER</td>
                        <td th:text="${client.accessTokenTtlMinutes + ' min'}">60 min</td>
                        <td class="text-right">
                            <a class="btn btn-sm btn-outline-secondary"
                               th:href="@{/auth/adm/oauth-clients/{id}(id=${client.id})}">Edit</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</th:block>
</body>
</html>
